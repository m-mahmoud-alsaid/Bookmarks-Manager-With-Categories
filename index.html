<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks Manager With Categories</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Changa+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap">
</head>

<body>
    <div class="bookmarks-section">
        <h1 class="main-title">Bookmarks Manager</h1>
        <div class="container">
            <div class="add-new-bookmarks">
                <h2 class="sub-title">Add New Bookmark</h2>
                <form id="add-form" class="add-form" action="">
                    <input id="bookmark-name-input" type="text" placeholder="Website text">
                    <input id="bookmark-url-input" type="url" placeholder="Website URL">
                    <input id="category-name-input" type="text" placeholder="Category Name">
                    <input id="add-bookmark-button" type="button" value="Add Bookmark">
                </form>
                <p id="warning-message" class="warning-message"></p>
            </div>

            <div class="show-bookmarks">
                <h2 class="sub-title">Show All Bookmarks</h2>
                <ul id="categories" class="categories"></ul>
                <div id="bookmarks" class="bookmarks"></div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
